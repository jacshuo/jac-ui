# ─────────────────────────────────────────────────
# Release – Auto version bump, GitHub Release,
#           npm publish, demo site deploy
#
# Trigger: manual dispatch (choose patch/minor/major)
#   OR push a tag like v1.2.3
# ─────────────────────────────────────────────────
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── 1. Bump version, tag, push ──────────────────
  version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags

  # ── 2. Build & publish to npm ───────────────────
  publish:
    name: Publish to npm
    needs: version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.new_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run dist

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── 3. GitHub Release with download artifacts ───
  github-release:
    name: GitHub Release
    needs: [version, publish]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.new_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install & build
        run: |
          npm ci
          npm run dist

      - name: Package release artifacts
        run: |
          tar -czf jac-ui-${{ needs.version.outputs.new_version }}.tar.gz -C dist .
          cd dist && zip -r ../jac-ui-${{ needs.version.outputs.new_version }}.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: v${{ needs.version.outputs.new_version }}
          generate_release_notes: true
          files: |
            jac-ui-${{ needs.version.outputs.new_version }}.tar.gz
            jac-ui-${{ needs.version.outputs.new_version }}.zip

  # ── 4. Deploy demo site to GitHub Pages ─────────
  deploy-demo:
    name: Deploy Demo
    needs: [version, publish]
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.new_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install & build demo
        run: |
          npm ci
          npm run build:demo

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-demo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
